services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-todo_db}
      POSTGRES_USER: ${POSTGRES_USER:-user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  matrix:
    build:
      context: .
      dockerfile: infra/matrix/Dockerfile.prod
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      UID: "991"
      GID: "991"
    volumes:
      - matrix_data:/data
    ports:
      - "${MATRIX_PORT:-8008}:8008"
    depends_on:
      - postgres
    restart: unless-stopped

  mautrix-whatsapp:
    build:
      context: .
      dockerfile: infra/mautrix-whatsapp/Dockerfile.dev
    environment:
      # WARN to prevent accidental message content logging at DEBUG/INFO.
      LOG_LEVEL: ${WHATSAPP_LOG_LEVEL:-WARN}
    volumes:
      - whatsapp_data:/data
    depends_on:
      - matrix
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
      args:
        VERSION: "1.0.0"
        COMMIT: "${GIT_COMMIT:-local}"
        DATE: "${BUILD_DATE:-unknown}"
    environment:
      PORT: ${BACKEND_PORT:-8080}
      DATABASE_URL: postgres://${POSTGRES_USER:-user}:${POSTGRES_PASSWORD:-password}@postgres:5432/${POSTGRES_DB:-todo_db}?sslmode=disable
      JWT_SECRET: ${JWT_SECRET:-supersecretjwtkey}
      WA_BRIDGE_BASE_URL: ${WA_BRIDGE_BASE_URL:-http://mautrix-whatsapp:29319}
      WA_BRIDGE_SHARED_SECRET: ${WA_BRIDGE_SHARED_SECRET:-TqVJ7k4v2YcZp3xJw9Lm6sAbN2qR8fH5dC1eG7yK0mP4rU6t}
      DEV_MATRIX_SERVER_NAME: messie.arpinfidel.com
      DEV_MATRIX_FED_BASE: http://matrix:8008
    expose:
      - "${BACKEND_PORT:-8080}"
    healthcheck:
      test: ["CMD", "true"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 10s
    restart: unless-stopped
    depends_on:
      - postgres
      - mautrix-whatsapp

  # No separate frontend container in prod; nginx serves SPA build
  nginx:
    build:
      context: .
      dockerfile: ./api-gateway/Dockerfile.prod
    ports:
      - "${NGINX_PORT:-18080}:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
  matrix_data:
  whatsapp_data:
