# Additional Synapse configuration enabling native Simplified Sliding Sync.
# Mounted via SYNAPSE_ADDITIONAL_CONFIG_DIR from docker-compose.dev.yml.
# Synapse 1.141+ supports both simplified sliding sync and traditional /sync.
#
# Keep this file minimal so it can be layered on top of homeserver.yaml
# generated by `matrix-synapse`.

# Enable the relevant MSCs for native sliding sync support.
experimental_features:
  # MSC3575: original sliding sync API plumbing.
  msc3575_enabled: true
  # MSC4186: native simplified sliding sync implementation in Synapse.
  msc4186_enabled: true
  # MSC4095 is required for list-scope filters used by simplified SS.
  msc4095_enabled: true
  # MSC3202: appservice transaction extensions — delivers to-device messages
  # and device list changes via appservice transactions instead of /sync.
  # Required for end-to-bridge encryption in appservice mode.
  msc3202_transaction_extensions: true
  # MSC2409: to-device messages for appservices (legacy flag, kept for compat).
  msc2409_to_device_messages_enabled: true
