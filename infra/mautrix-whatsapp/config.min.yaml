# Minimal mautrix-whatsapp config for local dev

homeserver:
  address: http://matrix:8008
  domain: messie.localhost

appservice:
  address: http://mautrix-whatsapp:29319
  hostname: 0.0.0.0
  port: 29319
  id: whatsapp
  as_token: "{{AS_TOKEN}}"
  hs_token: "{{HS_TOKEN}}"
  registration: /data/registration.yaml
  bot:
    username: whatsappbot

database:
  type: sqlite3-fk-wal
  uri: /data/mautrix-whatsapp.db

matrix:
  federate_rooms: false

bridge:
  # Share group portals across users (default)
  split_portals: false
  personal_filtering_spaces: false
  permissions:
    "messie.localhost": user
  encryption:
    allow: true
    default: true

network:
  displayname_template: '{{or .BusinessName .PushName .Phone .RedactedPhone "Unknown user"}}'
  history_sync:
    max_initial_conversations: -1
    request_full_sync: true

provisioning:
  # Development-only secret for the internal provisioning (admin) API.
  # Change this for your environment before exposing beyond local dev.
  shared_secret: TqVJ7k4v2YcZp3xJw9Lm6sAbN2qR8fH5dC1eG7yK0mP4rU6t
