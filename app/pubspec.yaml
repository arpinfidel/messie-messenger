name: messie_app
description: Messie messenger Flutter client using flutter_rust_bridge.
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.4.10
  cupertino_icons: ^1.0.5
  dio: ^5.4.0
  webview_flutter: ^4.7.0
  crypto: ^3.0.3
  yaml: ^3.1.2
  url_launcher: ^6.3.0
  qr_flutter: ^4.1.0
  flutter_secure_storage: ^9.0.0
  color_models: ^2.0.0
  path: ^1.8.3
  path_provider: ^2.1.2
  ffi: ^2.1.0
  go_router: ^14.2.0
  shared_preferences: ^2.2.3
  intl: ^0.20.2
  flutter_localizations:
    sdk: flutter
  characters: ^1.3.0
  messie_api:
    path: ../packages/messie_api
  enough_mail: ^2.1.0
  flutter_appauth: ^6.0.3

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/config/

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  integration_test:
    sdk: flutter
