# Configuration file for Synapse.
#
# This is a YAML file: see [1] for a quick introduction. Note in particular
# that *indentation is important*: all the elements of a list or dictionary
# should have the same indentation.
#
# [1] https://docs.ansible.com/ansible/latest/reference_appendices/YAMLSyntax.html
#
# For more information on how to configure Synapse, including a complete accounting of
# each option, go to docs/usage/configuration/config_documentation.md or
# https://element-hq.github.io/synapse/latest/usage/configuration/config_documentation.html
server_name: "messie.localhost"
pid_file: /data/homeserver.pid

listeners:
  - port: 8008
    tls: false
    type: http
    x_forwarded: true
    bind_addresses: ['::', '0.0.0.0']
    resources:
      - names: [client, federation]
        compress: false

database:
  name: sqlite3
  args:
    database: /data/homeserver.db

# Optional: let Synapse generate to /data if absent
media_store_path: /data/media_store
signing_key_path: "/data/signing.key"

enable_registration: true
registration_shared_secret: "dev_matrix_shared_secret"

# Load our appservices directly (WhatsApp bridge registration mounted here)
app_service_config_files:
  - /data/appservices/whatsapp-registration.yaml

# Make our local module importable and configure it inline
python_paths:
  - /data/custom_modules

modules:
  - module: block_bot_dms
    config:
      bot_mxid: "@whatsappbot:messie.localhost"
      admins:
        - "@bridge-admin:messie.localhost"
      block_dm_invites: true
      require_prefix_in_dm: false

trusted_key_servers:
  - server_name: "matrix.org"
  
