services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-todo_db}
      POSTGRES_USER: ${POSTGRES_USER:-user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
    ports: ["${POSTGRES_PORT:-5432}:5432"]
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    working_dir: /backend
    command: ["air", "-c", "/backend/.air.toml"]
    environment:
      PORT: ${BACKEND_PORT:-8080}
      DATABASE_URL: postgres://${POSTGRES_USER:-user}:${POSTGRES_PASSWORD:-password}@postgres:5432/${POSTGRES_DB:-todo_db}?sslmode=disable
      JWT_SECRET: ${JWT_SECRET:-supersecretjwtkey}
      DEV_MATRIX_SERVER_NAME: ${MATRIX_SERVER_NAME:-messie.localhost}
      DEV_MATRIX_FED_BASE: ${DEV_MATRIX_FED_BASE:-http://matrix:8008}
      # WhatsApp bridge provisioning API (dev defaults)
      WA_BRIDGE_BASE_URL: ${WA_BRIDGE_BASE_URL:-http://mautrix-whatsapp:29319}
      WA_BRIDGE_SHARED_SECRET: ${WA_BRIDGE_SHARED_SECRET:-TqVJ7k4v2YcZp3xJw9Lm6sAbN2qR8fH5dC1eG7yK0mP4rU6t}
      WA_BRIDGE_DB_PATH: ${WA_BRIDGE_DB_PATH:-/bridge-data/mautrix-whatsapp.db}
    volumes:
      - go-mod-cache:/go/pkg/mod
      - go-build-cache:/root/.cache/go-build
      # NOTE: This volume contains bridge crypto keys (Megolm sessions) now that
      # end-to-bridge encryption is enabled. The backend only queries portal/room
      # mapping tables (read-only). The backend already holds the bridge shared
      # secret so this doesn't expand the trust boundary.
      - whatsapp_data:/bridge-data:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 10s
    depends_on:
      - postgres

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api/v1}
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://127.0.0.1:5173', r => process.exit(r.statusCode < 500 ? 0 : 1)).on('error', () => process.exit(1))",
        ]
      interval: 5s
      timeout: 3s
      retries: 50
      start_period: 20s

  nginx:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile.dev
    ports:
      - "${NGINX_PORT:-8080}:80"
      - "${MATRIX_WEB_PORT:-80}:80"
      - "${MATRIX_TLS_PORT:-443}:443"
      - "${MATRIX_FED_PORT:-8448}:8448"
    depends_on:
      backend:
        condition: service_healthy
      # frontend:
      #   condition: service_healthy
    restart: unless-stopped

  matrix:
    build:
      context: .
      dockerfile: infra/matrix/Dockerfile.dev
    profiles: ["matrix"]
    environment:
      SYNAPSE_SERVER_NAME: ${MATRIX_SERVER_NAME:-messie.localhost}
      SYNAPSE_REPORT_STATS: ${MATRIX_REPORT_STATS:-no}
      SYNAPSE_NO_TLS: "true"
      SYNAPSE_ENABLE_REGISTRATION: ${MATRIX_ENABLE_REGISTRATION:-true}
      SYNAPSE_REGISTRATION_SHARED_SECRET: ${MATRIX_REGISTRATION_SHARED_SECRET:-dev_matrix_shared_secret}
      SYNAPSE_ADDITIONAL_CONFIG_DIR: /opt/matrix-config/conf.d
      UID: "991"
      GID: "991"
      PYTHONPATH: /data/custom_modules
    volumes:
      - matrix_data:/data
    ports:
      - "${MATRIX_PORT:-8008}:8008"
    restart: unless-stopped
    networks:
      default:
        aliases:
          - ${MATRIX_SERVER_NAME:-messie.localhost}

  mautrix-whatsapp:
    build:
      context: .
      dockerfile: infra/mautrix-whatsapp/Dockerfile.dev
    profiles: ["matrix"]
    environment:
      # Do not bind to host; only internal container-to-container access.
      # WARN in prod to prevent accidental message content logging at DEBUG/INFO.
      # Override to INFO/DEBUG only for local troubleshooting.
      LOG_LEVEL: ${WHATSAPP_LOG_LEVEL:-WARN}
    volumes:
      - whatsapp_data:/data
    depends_on:
      - matrix
    restart: unless-stopped

volumes:
  postgres_data:
  go-mod-cache:
  go-build-cache:
  matrix_data:
  whatsapp_data:
