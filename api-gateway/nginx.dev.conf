events {
    worker_connections 1024;
}

http {
    upstream backend {
        server backend:8080;
    }
    upstream matrix {
        server matrix:8008;
    }
    # Frontend is disabled in this profile. If you want to enable Vite proxy,
    # uncomment the block below and the location / section.
    # upstream frontend {
    #     server frontend:5173;
    # }

    server {
        listen 80 default_server;

        location /api/ {
            if ($request_method = OPTIONS) {
                add_header Access-Control-Allow-Origin $http_origin always;
                add_header Access-Control-Allow-Credentials true always;
                add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
                add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept, Origin, X-Requested-With" always;
                add_header Access-Control-Max-Age 86400 always;
                add_header Content-Length 0;
                add_header Content-Type text/plain;
                return 204;
            }

            add_header Access-Control-Allow-Origin $http_origin always;
            add_header Access-Control-Allow-Credentials true always;
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # location / {
        #     proxy_pass http://frontend;
        #     proxy_set_header Host $host;
        #     proxy_set_header X-Real-IP $remote_addr;
        #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        #     proxy_set_header X-Forwarded-Proto $scheme;
        #     proxy_http_version 1.1;
        #     proxy_set_header Upgrade $http_upgrade;
        #     proxy_set_header Connection 'upgrade';
        #     proxy_cache_bypass $http_upgrade;
        # }

        # Return 200 for / to help emulator liveness without frontend
        location = / {
            return 200 'nginx up';
        }
    }

    server {
        listen 80;
        server_name messie.localhost;

        location = /.well-known/matrix/client {
            default_type application/json;
            add_header Access-Control-Allow-Origin * always;
            return 200 '{"m.homeserver":{"base_url":"http://messie.localhost"}}';
        }

        location = /.well-known/matrix/server {
            default_type application/json;
            add_header Access-Control-Allow-Origin * always;
            return 200 '{"m.server":"messie.localhost"}';
        }

        location /_matrix/ {
            if ($request_method = OPTIONS) {
                add_header Access-Control-Allow-Origin $http_origin always;
                add_header Access-Control-Allow-Credentials true always;
                add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
                add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept, Origin, X-Requested-With" always;
                add_header Access-Control-Max-Age 86400 always;
                add_header Content-Length 0;
                add_header Content-Type text/plain;
                return 204;
            }

            proxy_hide_header Access-Control-Allow-Origin;
            proxy_hide_header Access-Control-Allow-Credentials;
            proxy_hide_header Access-Control-Allow-Methods;
            proxy_hide_header Access-Control-Allow-Headers;
            proxy_hide_header Access-Control-Max-Age;
            add_header Access-Control-Allow-Origin $http_origin always;
            add_header Access-Control-Allow-Credentials true always;
            proxy_pass http://matrix;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location / {
            return 200 'messie.localhost up';
        }
    }

    server {
        listen 443 ssl;
        listen 8448 ssl;
        server_name messie.localhost;

        ssl_certificate /etc/nginx/certs/messie.localhost.pem;
        ssl_certificate_key /etc/nginx/certs/messie.localhost-key.pem;
        ssl_protocols TLSv1.2 TLSv1.3;

        location = /.well-known/matrix/client {
            default_type application/json;
            add_header Access-Control-Allow-Origin * always;
            return 200 '{"m.homeserver":{"base_url":"https://messie.localhost"}}';
        }

        location = /.well-known/matrix/server {
            default_type application/json;
            add_header Access-Control-Allow-Origin * always;
            return 200 '{"m.server":"messie.localhost"}';
        }

        location /_matrix/ {
            if ($request_method = OPTIONS) {
                add_header Access-Control-Allow-Origin $http_origin always;
                add_header Access-Control-Allow-Credentials true always;
                add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
                add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept, Origin, X-Requested-With" always;
                add_header Access-Control-Max-Age 86400 always;
                add_header Content-Length 0;
                add_header Content-Type text/plain;
                return 204;
            }

            proxy_hide_header Access-Control-Allow-Origin;
            proxy_hide_header Access-Control-Allow-Credentials;
            proxy_hide_header Access-Control-Allow-Methods;
            proxy_hide_header Access-Control-Allow-Headers;
            proxy_hide_header Access-Control-Max-Age;
            add_header Access-Control-Allow-Origin $http_origin always;
            add_header Access-Control-Allow-Credentials true always;
            proxy_pass http://matrix;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
