openapi: 3.0.0
info:
  title: Todo Microservice API
  version: 1.0.0
servers:
  - url: http://localhost:8080/api/v1
paths:
  /users/by-matrix-id:
    get:
      security:
        - bearerAuth: []
      summary: Get user by Matrix ID
      operationId: getUserByMatrixId
      parameters:
        - in: query
          name: matrixId
          schema:
            type: string
          required: true
          description: Matrix user ID
      responses:
        "200":
          description: User found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /email/login-test:
    post:
      summary: Test email login and fetch recent message headers
      operationId: emailLoginTest
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EmailLoginRequest"
      responses:
        "200":
          description: Successfully fetched message headers
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmailMessagesResponse"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Authentication failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /email/inbox:
    post:
      summary: List recent inbox message headers
      operationId: emailInbox
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EmailLoginRequest"
      responses:
        "200":
          description: Successfully fetched inbox headers
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmailMessagesResponse"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Authentication failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /email/important:
    post:
      summary: List recent important message headers (deprecated)
      deprecated: true
      operationId: emailImportant
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EmailLoginRequest"
      responses:
        "410":
          description: Endpoint deprecated. Use /email/list instead.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /email/list:
    post:
      summary: List recent message headers for a mailbox or flag query
      operationId: emailList
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EmailListRequest"
      responses:
        "200":
          description: Successfully fetched headers
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmailMessagesResponse"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Authentication failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /email/headers:
    post:
      summary: List recent email headers with threading metadata
      operationId: emailHeaders
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EmailLoginRequest"
      responses:
        "200":
          description: Successfully fetched rich headers
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmailRichHeadersResponse"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Authentication failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /email/threads:
    post:
      summary: List recent email threads
      operationId: emailThreads
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EmailLoginRequest"
      responses:
        "200":
          description: Successfully fetched thread headers
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmailMessagesResponse"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Authentication failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /todolists:
    post:
      security:
        - bearerAuth: []
      summary: Create a new todo list
      operationId: createTodoList
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NewTodoList"
      responses:
        "201":
          description: Todo list created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TodoList"
        "400":
          description: Invalid input
    get:
      security:
        - bearerAuth: []
      summary: Get todo lists by owner ID
      operationId: getTodoListsByUserId
      parameters:
        - in: query
          name: userId
          schema:
            type: string
            format: uuid
          required: true
          description: ID of the user to retrieve todo lists for
      responses:
        "200":
          description: A list of todo lists
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TodoList"
  /todolists/{listId}:
    get:
      security:
        - bearerAuth: []
      summary: Get a todo list by ID
      operationId: getTodoListById
      parameters:
        - in: path
          name: listId
          schema:
            type: string
            format: uuid
          required: true
          description: ID of the todo list to retrieve
      responses:
        "200":
          description: Todo list found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TodoList"
        "404":
          description: Todo list not found
    put:
      security:
        - bearerAuth: []
      summary: Update a todo list
      operationId: updateTodoList
      parameters:
        - in: path
          name: listId
          schema:
            type: string
            format: uuid
          required: true
          description: ID of the todo list to update
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTodoList"
      responses:
        "200":
          description: Todo list updated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TodoList"
        "400":
          description: Invalid input
        "404":
          description: Todo list not found
    delete:
      security:
        - bearerAuth: []
      summary: Delete a todo list
      operationId: deleteTodoList
      parameters:
        - in: path
          name: listId
          schema:
            type: string
            format: uuid
          required: true
          description: ID of the todo list to delete
      responses:
        "204":
          description: Todo list deleted successfully
        "404":
          description: Todo list not found
  /todolists/{listId}/items:
    post:
      security:
        - bearerAuth: []
      summary: Create a new todo item in a list
      operationId: createTodoItem
      parameters:
        - in: path
          name: listId
          schema:
            type: string
            format: uuid
          required: true
          description: ID of the todo list
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NewTodoItem"
      responses:
        "201":
          description: Todo item created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TodoItem"
        "400":
          description: Invalid input
        "404":
          description: Todo list not found
    get:
      security:
        - bearerAuth: []
      summary: Get todo items by list ID
      operationId: getTodoItemsByListId
      parameters:
        - in: path
          name: listId
          schema:
            type: string
            format: uuid
          required: true
          description: ID of the todo list to retrieve items for
      responses:
        "200":
          description: A list of todo items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TodoItem"
        "404":
          description: Todo list not found
  /todolists/{listId}/items/{itemId}:
    get:
      security:
        - bearerAuth: []
      summary: Get a todo item by ID
      operationId: getTodoItemById
      parameters:
        - in: path
          name: listId
          schema:
            type: string
            format: uuid
          required: true
          description: ID of the todo list
        - in: path
          name: itemId
          schema:
            type: string
            format: uuid
          required: true
          description: ID of the todo item to retrieve
      responses:
        "200":
          description: Todo item found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TodoItem"
        "404":
          description: Todo item or list not found
    put:
      security:
        - bearerAuth: []
      summary: Update a todo item
      operationId: updateTodoItem
      parameters:
        - in: path
          name: listId
          schema:
            type: string
            format: uuid
          required: true
          description: ID of the todo list
        - in: path
          name: itemId
          schema:
            type: string
            format: uuid
          required: true
          description: ID of the todo item to update
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTodoItem"
      responses:
        "200":
          description: Todo item updated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TodoItem"
        "400":
          description: Invalid input
        "404":
          description: Todo item or list not found
    delete:
      security:
        - bearerAuth: []
      summary: Delete a todo item
      operationId: deleteTodoItem
      parameters:
        - in: path
          name: listId
          schema:
            type: string
            format: uuid
          required: true
          description: ID of the todo list
        - in: path
          name: itemId
          schema:
            type: string
            format: uuid
          required: true
          description: ID of the todo item to delete
      responses:
        "204":
          description: Todo item deleted successfully
        "404":
          description: Todo item or list not found
  /todolists/{listId}/collaborators:
    get:
      security:
        - bearerAuth: []
      summary: Get collaborators for a todo list
      operationId: getCollaborators
      parameters:
        - in: path
          name: listId
          schema:
            type: string
            format: uuid
          required: true
          description: ID of the todo list to retrieve collaborators for
      responses:
        "200":
          description: A list of collaborators
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CollaboratorDetail"
        "404":
          description: Todo list not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    post:
      security:
        - bearerAuth: []
      summary: Add a collaborator to a todo list
      operationId: addCollaborator
      parameters:
        - in: path
          name: listId
          schema:
            type: string
            format: uuid
          required: true
          description: ID of the todo list
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NewCollaborator"
      responses:
        "201":
          description: Collaborator added successfully
        "400":
          description: Invalid input
        "404":
          description: Todo list or user not found
        "409":
          description: User is already a collaborator
  /todolists/{listId}/collaborators/{userId}:
    delete:
      security:
        - bearerAuth: []
      summary: Remove a collaborator from a todo list
      operationId: removeCollaborator
      parameters:
        - in: path
          name: listId
          schema:
            type: string
            format: uuid
          required: true
          description: ID of the todo list
        - in: path
          name: userId
          schema:
            type: string
            format: uuid
          required: true
          description: ID of the user to remove as collaborator
      responses:
        "204":
          description: Collaborator removed successfully
        "404":
          description: Todo list or collaborator not found
  /calendar/sources/import:
    post:
      security:
        - bearerAuth: []
      summary: Import a calendar source from an uploaded ICS file
      operationId: importCalendarSource
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
                - category
              properties:
                file:
                  type: string
                  format: binary
                category:
                  type: string
                display_name:
                  type: string
      responses:
        "201":
          description: Calendar source imported successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CalendarImportResponse"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Unauthorized
  /calendar/sources:
    get:
      security:
        - bearerAuth: []
      summary: Get calendar sources for the current user
      operationId: getCalendarSources
      responses:
        "200":
          description: Calendar sources
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CalendarSource"
        "401":
          description: Unauthorized
  /calendar/sources/link:
    post:
      security:
        - bearerAuth: []
      summary: Add a linked ICS calendar source
      operationId: createLinkedCalendarSource
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NewCalendarLinkSource"
      responses:
        "201":
          description: Linked calendar source imported successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CalendarImportResponse"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Unauthorized
  /calendar/sources/{sourceId}:
    get:
      security:
        - bearerAuth: []
      summary: Get a calendar source by ID
      operationId: getCalendarSourceById
      parameters:
        - in: path
          name: sourceId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Calendar source
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CalendarSource"
        "404":
          description: Calendar source not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    patch:
      security:
        - bearerAuth: []
      summary: Rename a calendar source
      operationId: updateCalendarSource
      parameters:
        - in: path
          name: sourceId
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCalendarSource"
      responses:
        "200":
          description: Updated calendar source
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CalendarSource"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Calendar source not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    delete:
      security:
        - bearerAuth: []
      summary: Delete a calendar source and its imported events
      operationId: deleteCalendarSource
      parameters:
        - in: path
          name: sourceId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: Calendar source deleted successfully
        "404":
          description: Calendar source not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /calendar/sources/{sourceId}/refresh:
    post:
      security:
        - bearerAuth: []
      summary: Refresh a linked calendar source
      operationId: refreshCalendarSource
      parameters:
        - in: path
          name: sourceId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Calendar source refreshed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CalendarImportResponse"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Calendar source not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /calendar/events:
    get:
      security:
        - bearerAuth: []
      summary: Get imported calendar events for the current user
      operationId: getCalendarEvents
      parameters:
        - in: query
          name: from
          required: false
          schema:
            type: string
            format: date-time
        - in: query
          name: to
          required: false
          schema:
            type: string
            format: date-time
        - in: query
          name: sourceId
          required: false
          schema:
            type: string
            format: uuid
        - in: query
          name: cursor
          required: false
          description: Anchor timestamp for cursor-based schedule pagination.
          schema:
            type: string
            format: date-time
        - in: query
          name: direction
          required: false
          description: Fetch events before or after the cursor.
          schema:
            type: string
            enum: [before, after]
        - in: query
          name: limit
          required: false
          description: Maximum number of events to return for cursor-based queries.
          schema:
            type: integer
            minimum: 1
            maximum: 200
      responses:
        "200":
          description: Calendar events
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CalendarEvent"
        "401":
          description: Unauthorized
        "404":
          description: Calendar source not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /calendar/events/{eventId}:
    get:
      security:
        - bearerAuth: []
      summary: Get a calendar event by ID
      operationId: getCalendarEventById
      parameters:
        - in: path
          name: eventId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Calendar event
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CalendarEvent"
        "404":
          description: Calendar event not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /calendar/upcoming:
    get:
      security:
        - bearerAuth: []
      summary: Get upcoming imported calendar events for the current user
      operationId: getUpcomingCalendarEvents
      parameters:
        - in: query
          name: limit
          required: false
          schema:
            type: integer
            format: int32
      responses:
        "200":
          description: Upcoming calendar events
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CalendarEvent"
        "401":
          description: Unauthorized
  /auth/matrix/openid:
    post:
      summary: Authenticate using Matrix OpenID
      operationId: PostMatrixAuth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MatrixOpenIDRequest"
      responses:
        "200":
          description: Matrix authentication successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MatrixAuthResponse"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Unauthorized - Matrix token verification failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /connections:
    get:
      security:
        - bearerAuth: []
      summary: List bridge connections for current user
      description: |
        Returns zero or more connection entries per provider. Providers that support
        multi-account logins will return multiple items with the same `provider`
        value, one per account.
      operationId: getConnections
      responses:
        "200":
          description: List of provider connections
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BridgeConnection"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /bridge/provision/v3/login/flows:
    get:
      security:
        - bearerAuth: []
      summary: Get available login flows for a provider
      operationId: bridgeGetLoginFlows
      parameters:
        - in: query
          name: provider
          required: true
          schema:
            type: string
            example: whatsapp
      responses:
        "200":
          description: Fetched flows
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BridgeLoginFlowsResponse"
        "401":
          description: Unauthorized


  /bridge/provision/v3/login/start/{flow}:
    post:
      security:
        - bearerAuth: []
      summary: Start a login process for a provider
      operationId: bridgeStartLogin
      parameters:
        - in: path
          name: flow
          required: true
          schema:
            type: string
            example: qr
        - in: query
          name: provider
          required: true
          schema:
            type: string
            example: whatsapp
      responses:
        "200":
          description: First login step to render/handle
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BridgeLoginStep"
        "401":
          description: Unauthorized

  /bridge/provision/v3/login/step/{process_id}/{step_id}/{action}:
    post:
      security:
        - bearerAuth: []
      summary: Submit a login step
      operationId: bridgeSubmitLoginStep
      parameters:
        - in: path
          name: process_id
          required: true
          schema:
            type: string
        - in: path
          name: step_id
          required: true
          schema:
            type: string
        - in: path
          name: action
          required: true
          schema:
            type: string
            enum: [display_and_wait, user_input, cookies]
        - in: query
          name: provider
          required: true
          schema:
            type: string
            example: whatsapp
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        "200":
          description: Next login step
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BridgeLoginStep"
        "401":
          description: Unauthorized

  /bridge/provision/v3/whoami:
    get:
      security:
        - bearerAuth: []
      summary: Get provider-specific whoami with logins
      operationId: bridgeWhoami
      parameters:
        - in: query
          name: provider
          required: true
          schema:
            type: string
            example: whatsapp
      responses:
        "200":
          description: Whoami from bridge
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BridgeWhoamiResponse"
        "401":
          description: Unauthorized

  /bridge/room-mappings:
    get:
      security:
        - bearerAuth: []
      summary: List bridge room to login mappings for current user
      operationId: getBridgeRoomMappings
      parameters:
        - in: query
          name: provider
          required: true
          schema:
            type: string
            example: whatsapp
      responses:
        "200":
          description: Room mappings for bridged rooms owned by the current user
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BridgeRoomMapping"
        "401":
          description: Unauthorized

  /bridge/provision/v3/logout/{login_id}:
    post:
      security:
        - bearerAuth: []
      summary: Log out a specific login or all
      operationId: bridgeLogout
      parameters:
        - in: path
          name: login_id
          required: true
          schema:
            type: string
            example: all
        - in: query
          name: provider
          required: true
          schema:
            type: string
            example: whatsapp
      responses:
        "200":
          description: Logged out
        "204":
          description: Logged out
        "401":
          description: Unauthorized
  
  

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    User:
      type: object
      required:
        - id
        - email
        - matrix_id
      properties:
        id:
          type: string
          format: uuid
          description: ID of the user
        email:
          type: string
          format: email
          description: Email of the user
          example: "newuser@example.com"
        matrix_id:
          type: string
          description: Matrix ID of the user
          example: "@user:matrix.example.com"
        created_at:
          type: string
          format: date-time
          description: Timestamp when the user was created
        updated_at:
          type: string
          format: date-time
          description: Timestamp when the user was last updated
    CollaboratorDetail:
      type: object
      required:
        - list_id
        - collaborator_id
        - username
        - matrix_id
      properties:
        list_id:
          type: string
          format: uuid
          description: ID of the todo list
        username:
          type: string
          description: Collaborator username
          example: "123e4567-e89b-12d3-a456-426614174000"
        collaborator_id:
          type: string
          format: uuid
          description: ID of the collaborator user
          example: "123e4567-e89b-12d3-a456-426614174000"
        matrix_id:
          type: string
          description: Matrix ID of the collaborator
          example: "@alice:messie.localhost"
        display_name:
          type: string
          nullable: true
          description: Human-friendly collaborator name when available
          example: "Alice"
    Error:
      type: object
      required:
        - message
      properties:
        message:
          type: string
          example: "Something went wrong"
    TodoList:
      type: object
      required:
        - id
        - owner_id
        - title
        - description
      properties:
        id:
          type: string
          format: uuid
        owner_id:
          type: string
          format: uuid
        title:
          type: string
          minLength: 1
          default: ""
        description:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    NewTodoList:
      type: object
      required:
        - title
        - description
      properties:
        title:
          type: string
          minLength: 1
          default: ""
        description:
          type: string
    UpdateTodoList:
      type: object
      required:
        - title
        - description
      properties:
        title:
          type: string
          minLength: 1
          default: ""
        description:
          type: string
    TodoItem:
      type: object
      required:
        - id
        - list_id
        - title
        - completed
        - position
        - description
      properties:
        id:
          type: string
          format: uuid
        list_id:
          type: string
          format: uuid
        title:
          type: string
          minLength: 1
          default: ""
        description:
          type: string
        completed:
          type: boolean
        due_date:
          type: string
          format: date-time
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        position:
          type: string
          description: Fractional index for ordering todo items within a list.
    NewTodoItem:
      type: object
      required:
        - list_id
        - title
        - position
        - description
        - completed
      properties:
        list_id:
          type: string
          format: uuid
        title:
          type: string
          minLength: 1
          default: ""
        description:
          type: string
        completed:
          type: boolean
          default: false
        due_date:
          type: string
          format: date-time
        position:
          type: string
    UpdateTodoItem:
      type: object
      required:
        - title
        - description
        - completed
        - position
      properties:
        title:
          type: string
          minLength: 1
          default: ""
        description:
          type: string
        completed:
          type: boolean
        due_date:
          type: string
          format: date-time
        position:
          type: string
    NewCollaborator:
      type: object
      required:
        - user_id
      properties:
        user_id:
          type: string
          format: uuid
    CalendarSource:
      type: object
      required:
        - id
        - user_id
        - kind
        - display_name
        - category
        - import_mode
        - refresh_state
      properties:
        id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        kind:
          type: string
          example: ics_file
        display_name:
          type: string
          example: Work Calendar
        category:
          type: string
          example: Work
        import_mode:
          type: string
          example: upload
        source_url:
          type: string
          nullable: true
          example: https://calendar.example.com/feed.ics
        refresh_state:
          type: string
          example: imported
        last_synced_at:
          type: string
          format: date-time
        last_refresh_attempt_at:
          type: string
          format: date-time
        last_refresh_error:
          type: string
          nullable: true
        etag:
          type: string
          nullable: true
        last_modified:
          type: string
          format: date-time
        next_refresh_at:
          type: string
          format: date-time
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    NewCalendarLinkSource:
      type: object
      required:
        - url
        - category
      properties:
        url:
          type: string
          format: uri
        category:
          type: string
        display_name:
          type: string
    UpdateCalendarSource:
      type: object
      required:
        - display_name
        - category
      properties:
        category:
          type: string
        display_name:
          type: string
    CalendarEvent:
      type: object
      required:
        - id
        - source_id
        - external_uid
        - title
        - description
        - location
        - starts_at
        - ends_at
        - all_day
        - status
        - timezone
        - source_display_name
      properties:
        id:
          type: string
          format: uuid
        source_id:
          type: string
          format: uuid
        external_uid:
          type: string
        title:
          type: string
        description:
          type: string
        location:
          type: string
        starts_at:
          type: string
          format: date-time
        ends_at:
          type: string
          format: date-time
        all_day:
          type: boolean
        status:
          type: string
        timezone:
          type: string
        recurrence_summary:
          type: string
          nullable: true
        source_display_name:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    CalendarImportResponse:
      type: object
      required:
        - source
        - imported_event_count
      properties:
        source:
          $ref: "#/components/schemas/CalendarSource"
        imported_event_count:
          type: integer
          format: int32
    MatrixOpenIDRequest:
      type: object
      required:
        - access_token
        - matrix_server_name
      properties:
        access_token:
          type: string
          description: Matrix OpenID access token
          example: "matrix_access_token_123"
        matrix_server_name:
          type: string
          description: Matrix homeserver name
          example: "matrix.example.com"
    MatrixAuthResponse:
      type: object
      required:
        - token
        - mxid
        - user_id
      properties:
        token:
          type: string
          description: JWT token for authentication
          example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
        mxid:
          type: string
          description: Matrix user ID
          example: "@user:matrix.example.com"
        user_id:
          type: string
          format: uuid
          description: ID of the user in the todo service
          example: "123e4567-e89b-12d3-a456-426614174000"
    EmailLoginRequest:
      type: object
      required:
        - host
        - port
        - email
        - appPassword
      properties:
        host:
          type: string
        port:
          type: integer
          format: int32
        email:
          type: string
          format: email
        appPassword:
          type: string
          format: password
    EmailListRequest:
      allOf:
        - $ref: "#/components/schemas/EmailLoginRequest"
        - type: object
          properties:
            mailbox:
              type: string
              description: Mailbox name to select (defaults to INBOX when omitted)
            searchFlags:
              type: array
              description: Optional IMAP flags to filter on (e.g. ["\\Flagged"])
              items:
                type: string
    EmailMessageHeader:
      type: object
      properties:
        from:
          type: string
        subject:
          type: string
        date:
          type: string
          format: date-time
    EmailMessagesResponse:
      type: object
      properties:
        messages:
          type: array
          items:
            $ref: "#/components/schemas/EmailMessageHeader"
        unreadCount:
          type: integer
          format: int32
    EmailRichHeader:
      type: object
      properties:
        from:
          type: string
        subject:
          type: string
        date:
          type: string
          format: date-time
        messageId:
          type: string
        inReplyTo:
          type: string
        references:
          type: array
          items:
            type: string
    EmailRichHeadersResponse:
      type: object
      required:
        - messages
      properties:
        messages:
          type: array
          items:
            $ref: "#/components/schemas/EmailRichHeader"
    BridgeConnection:
      type: object
      required:
        - provider
        - status
      properties:
        provider:
          type: string
          example: whatsapp
        status:
          type: string
          enum:
            - not_connected
            - connecting
            - connected
        account:
          $ref: "#/components/schemas/BridgeAccount"
          nullable: true
        limits:
          type: object
          nullable: true
          additionalProperties: true
    BridgeAccount:
      type: object
      properties:
        externalId:
          type: string
          example: 15551234567@s.whatsapp.net
        displayName:
          type: string
          example: "+1 555 123 4567"
    WAStartResponse:
      type: object
      required:
        - connectionId
        - method
        - expiresAt
      properties:
        connectionId:
          type: string
        method:
          type: string
          enum:
            - qr
            - code
        qrAscii:
          type: string
          nullable: true
          description: ASCII QR for display in terminals; optional
        code:
          type: string
          nullable: true
          description: Pairing code string; optional
        expiresAt:
          type: string
          format: date-time
    WAStatusResponse:
      type: object
      required:
        - state
      properties:
        state:
          type: string
          enum:
            - pending
            - scanned
            - connected
            - failed
        account:
          type: object
          nullable: true
          properties:
            externalId:
              type: string
            displayName:
              type: string
        error:
          type: string
          nullable: true
    BridgeLoginFlow:
      type: object
      description: A login flow that can be used to sign into the remote network.
      required:
        - id
        - name
        - description
      properties:
        id:
          type: string
          example: qr
        name:
          type: string
          example: QR code
        description:
          type: string
          example: Log in by scanning a QR code
    BridgeLoginFlowsResponse:
      type: object
      properties:
        flows:
          type: array
          items:
            $ref: "#/components/schemas/BridgeLoginFlow"
    BridgeWhoamiLogin:
      type: object
      description: Minimal info about an individual login
      required:
        - id
        - name
      properties:
        id:
          type: string
          description: Unique login ID defined by the bridge
        name:
          type: string
          description: Human-friendly name of the login
        state:
          type: string
          description: Optional state label for the login
        profile:
          type: object
          nullable: true
          properties:
            displayName:
              type: string
            externalId:
              type: string
    BridgeWhoamiResponse:
      type: object
      description: Provider metadata and current user logins
      properties:
        homeserver:
          type: string
        bridge_bot:
          type: string
        command_prefix:
          type: string
        network:
          $ref: "#/components/schemas/BridgeName"
        login_flows:
          type: array
          items:
            $ref: "#/components/schemas/BridgeLoginFlow"
        logins:
          type: array
          items:
            $ref: "#/components/schemas/BridgeWhoamiLogin"
    BridgeRoomMapping:
      type: object
      required:
        - provider
        - room_id
        - login_id
      properties:
        provider:
          type: string
          example: whatsapp
        room_id:
          type: string
          format: matrix_room_id
        login_id:
          type: string
        login_name:
          type: string
        space_room:
          type: string
          format: matrix_room_id
          nullable: true
        preferred:
          type: boolean
    BridgeName:
      type: object
      description: Info about the bridged network
      required:
        - displayname
        - network_url
        - network_icon
        - network_id
      properties:
        displayname:
          type: string
          example: WhatsApp
        network_url:
          type: string
          example: https://www.whatsapp.com
        network_icon:
          type: string
          example: mxc://example.com/abc123
        network_id:
          type: string
          example: whatsapp
        beeper_bridge_type:
          type: string
          example: com.beeper.whatsapp
    BridgeState:
      type: object
      description: Connection status of an individual login
      required:
        - state_event
        - timestamp
      properties:
        state_event:
          type: string
          enum: [ CONNECTING, CONNECTED, TRANSIENT_DISCONNECT, BAD_CREDENTIALS, UNKNOWN_ERROR ]
        timestamp:
          type: number
          format: double
          description: Unix time in milliseconds
        error:
          type: string
        message:
          type: string
        reason:
          type: string
        info:
          type: object
          additionalProperties: true
    RemoteProfile:
      type: object
      description: Profile info on the remote network
      properties:
        phone:
          type: string
        email:
          type: string
          format: email
        username:
          type: string
        name:
          type: string
        avatar:
          type: string
    # Duplicate removed: BridgeWhoamiLogin defined earlier
    BridgeLoginStep:
      oneOf:
        - $ref: "#/components/schemas/LoginStepDisplayAndWait"
        - $ref: "#/components/schemas/LoginStepUserInput"
        - $ref: "#/components/schemas/LoginStepCookies"
        - $ref: "#/components/schemas/LoginStepComplete"
      discriminator:
        propertyName: type
        mapping:
          display_and_wait: '#/components/schemas/LoginStepDisplayAndWait'
          user_input: '#/components/schemas/LoginStepUserInput'
          cookies: '#/components/schemas/LoginStepCookies'
          complete: '#/components/schemas/LoginStepComplete'
    LoginStepDisplayAndWait:
      type: object
      required: [ type, display_and_wait ]
      properties:
        type:
          type: string
          enum: [ display_and_wait ]
        process_id:
          type: string
        login_id:
          type: string
        step_id:
          type: string
        display_and_wait:
          type: object
          properties:
            message:
              type: string
            data:
              type: string
            image_url:
              type: string
    LoginStepUserInput:
      type: object
      required: [ type, user_input ]
      properties:
        type:
          type: string
          enum: [ user_input ]
        process_id:
          type: string
        login_id:
          type: string
        step_id:
          type: string
        user_input:
          type: object
          properties:
            fields:
              type: array
              items:
                type: object
                properties:
                  id:
                    type: string
                  label:
                    type: string
                  kind:
                    type: string
                  secret:
                    type: boolean
    LoginStepCookies:
      type: object
      required: [ type, cookies ]
      properties:
        type:
          type: string
          enum: [ cookies ]
        process_id:
          type: string
        login_id:
          type: string
        step_id:
          type: string
        cookies:
          type: object
          properties:
            names:
              type: array
              items: { type: string }
    LoginStepComplete:
      type: object
      required: [ type, complete ]
      properties:
        type:
          type: string
          enum: [ complete ]
        process_id:
          type: string
        login_id:
          type: string
        step_id:
          type: string
        complete:
          type: object
          properties:
            user_login_id:
              type: string
